# Package whose UID is allowed to access the protected Scene ports.
PKG=com.omarea.vtools

# Space-separated TCP ports to hide from loopback connect probes.
PORTS="8788 8765 14731 14754"

# eBPF cgroup hooks hide connect() probes and keep bind()/getsockname() consistent.
ENABLE_EBPF=1

# Extra UIDs that may access Scene ports, separated by spaces.
# Normally this can stay empty; use it if your Scene build has helper processes.
EXTRA_ALLOWED_UIDS=""

# Wait until package manager or a running process reveals the real package UID.
# /data/data owner is only used as an extra UID after a trusted UID is found.
WAIT_FOR_UID_TIMEOUT=300

# Set to 1 if you want to wait for the app process before loading eBPF.
# The UID whitelist means loading before the app starts is normally safe.
WAIT_FOR_PROCESS=0
